name: Sync Scholar Publications

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Sync publications from Google Scholar to Notion
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_PUBLICATIONS_DB_ID: ${{ secrets.NOTION_PUBLICATIONS_DB_ID }}
          SCHOLAR_USER_ID: ${{ secrets.SCHOLAR_USER_ID }}
          SERPAPI_API_KEY: ${{ secrets.SERPAPI_API_KEY }}
          SCHOLAR_LANG: en
        run: node scripts/sync-scholar-publications.js
